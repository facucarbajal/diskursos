<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discursos CFK</title>
<style>
  :root {
    --bg:       #0d1a0f;
    --panel:    #0f2212;
    --panel2:   #163b1a;
    --accent:   #4dbb6a;
    --accent2:  #2e7d3a;
    --text:     #e4ede6;
    --text-dim: #7aA07f;
    --border:   #1e3f22;
    --hover:    #142e18;
    --hl-bg:    #1e5c26;
    --hl-fg:    #c8f5d0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.3px; flex-shrink: 0; }
  .logo span { color: var(--accent); }

  .search-wrap {
    flex: 1;
    max-width: 640px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 7px 14px 7px 36px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .search-wrap input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 2px rgba(83,52,131,.25);
  }

  .search-wrap .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .header-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .header-meta b { color: var(--text); }

  .header-filters {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .header-filters select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  .header-filters select:hover { border-color: var(--accent2); }
  .header-filters select:focus { border-color: var(--accent2); }
  .header-filters select option:disabled { color: #555; }
  .header-filters select.active { border-color: var(--accent); color: var(--accent); }
  .header-filter-clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 26px; height: 26px;
    padding: 0;
    font-size: 0.85rem;
    line-height: 1;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .header-filter-clear:hover { color: var(--text); border-color: var(--accent2); }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-width: 160px;
    max-width: 400px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
  }

  .sidebar-resizer {
    position: absolute;
    right: -4px; top: 0; bottom: 0;
    width: 8px;
    cursor: col-resize;
    z-index: 10;
    background: transparent;
    transition: background .15s;
  }
  .sidebar-resizer:hover,
  .sidebar-resizer.dragging { background: var(--accent2); opacity: .6; }

  .sidebar-header {
    padding: 11px 14px 9px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-tree {
    flex: 1;
    overflow-y: auto;
    padding: 6px 4px 16px;
  }

  /* Tree nodes */
  .tree-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.84rem;
    transition: background .12s;
    user-select: none;
  }
  .tree-item:hover { background: var(--hover); }
  .tree-item.active { background: var(--panel2); }

  .tree-toggle {
    font-size: 0.58rem;
    color: var(--text-dim);
    width: 10px;
    flex-shrink: 0;
    text-align: center;
    transition: transform .15s;
  }
  .tree-toggle.open { transform: rotate(90deg); }

  .tree-icon { font-size: 0.95rem; flex-shrink: 0; }
  .tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tree-count {
    font-size: 0.68rem;
    color: var(--text-dim);
    background: #1e2d4a;
    padding: 1px 6px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .tree-months { display: none; padding-left: 14px; }
  .tree-months.open { display: block; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Loading */
  .loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text-dim);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toolbar */
  .toolbar {
    padding: 9px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .breadcrumb {
    font-size: 0.88rem;
    flex: 1;
  }
  .breadcrumb span { color: var(--text-dim); margin: 0 4px; }
  .breadcrumb b { color: var(--text); font-weight: 600; }

  .sort-bar { display: flex; gap: 4px; }
  .sort-btn {
    padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all .12s;
    white-space: nowrap;
  }
  .sort-btn:hover { background: var(--hover); color: var(--text); }
  .sort-btn.active { background: var(--panel2); color: var(--text); border-color: var(--accent2); }

  /* Results header */
  .results-header {
    padding: 8px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .results-header b { color: var(--text); }

  /* Speech list */
  .speech-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 24px;
  }

  .speech-card {
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid transparent;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .speech-card:hover {
    background: var(--panel);
    border-color: var(--border);
  }

  .speech-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.35;
  }

  .speech-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    flex-wrap: wrap;
  }

  .speech-date {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 500;
  }

  .pill {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--panel2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .pill.match { background: rgba(83,52,131,.4); border-color: var(--accent2); color: #c9b8ff; }
  .pill.speaker-cristina { background: rgba(45,80,130,.45); border-color: #3a6abf; color: #a8c8ff; }
  .pill.speaker-nestor   { background: rgba(130,70,30,.45); border-color: #b86030; color: #ffcca8; }
  .pill.dup-group        { font-weight: 600; }
  .pill.location-prov    { background: rgba(180,140,30,.4);  border-color: #b89030; color: #ffe2a0; }
  .pill.location-loc     { background: rgba(140,180,80,.35); border-color: #82a020; color: #d5f0b0; }
  .pill.location-pais    { background: rgba(200,60,60,.35);  border-color: #c83c3c; color: #ffb8b8; }
  .pill.location-inst    { background: rgba(120,80,180,.4);  border-color: #8060c0; color: #d8c8ff; }
  .pill.placeholder      { background: transparent; color: var(--text-dim); border-style: dashed; opacity: .55; }
  .pill.editable         { cursor: pointer; }
  .pill.editable:hover   { filter: brightness(1.35); opacity: 1; }

  .location-editor-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .location-editor {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
    min-width: 380px; max-width: 90vw;
    box-shadow: 0 10px 40px rgba(0,0,0,.6);
    color: var(--text);
  }
  .location-editor h3 { margin: 0 0 6px; font-size: 0.95rem; }
  .location-editor .title-preview {
    font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px;
    font-style: italic; max-width: 360px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .location-editor label {
    display: block; margin-top: 10px; font-size: 0.72rem;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em;
  }
  .location-editor select,
  .location-editor input[type=text] {
    width: 100%; box-sizing: border-box;
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 8px; font-size: 0.85rem; margin-top: 4px;
  }
  .location-editor .editor-buttons {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
  }
  .location-editor button {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 14px; font-size: 0.8rem; cursor: pointer;
  }
  .location-editor button.primary {
    background: rgba(45,80,130,.6); border-color: #3a6abf; color: #fff;
  }
  .location-editor button.danger {
    background: rgba(120,50,50,.35); border-color: #b04040; color: #ffb8b8;
    margin-right: auto;
  }
  .location-editor .apply-check {
    margin-right: 6px; vertical-align: middle;
    accent-color: #3a6abf;
  }

  .sort-btn.edit-active { border-color: #c0392b; color: #ff8a80; background: rgba(192,57,43,.2); }

  .speech-card.selectable { cursor: pointer; }
  .speech-card.selected {
    background: rgba(192,57,43,.12);
    border-color: rgba(192,57,43,.4) !important;
  }

  .card-check {
    width: 17px; height: 17px;
    border-radius: 4px;
    border: 2px solid var(--text-dim);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: #ff8a80;
    background: transparent;
    transition: all .12s;
    margin-right: 2px;
  }
  .speech-card.selected .card-check {
    background: rgba(192,57,43,.35);
    border-color: #c0392b;
  }

  .delete-selected-btn {
    padding: 4px 12px;
    border-radius: 5px;
    border: 1px solid #c0392b;
    background: rgba(192,57,43,.2);
    color: #ff8a80;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background .12s;
    white-space: nowrap;
  }
  .delete-selected-btn:hover { background: rgba(192,57,43,.4); }

  .speech-excerpt {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  mark {
    background: var(--hl-bg);
    color: var(--hl-fg);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .page-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all .12s;
  }
  .page-btn:hover { background: var(--hover); color: var(--text); }
  .page-btn.active { background: var(--panel2); color: var(--text); border-color: var(--accent2); }
  .page-btn:disabled { opacity: .35; cursor: default; }
  .page-info { font-size: 0.78rem; color: var(--text-dim); }

  /* ── READER ── */
  .reader {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .reader-toolbar {
    padding: 9px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .back-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all .12s;
  }
  .back-btn:hover { background: var(--hover); color: var(--text); }

  .reader-body {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }

  .reader-date {
    font-size: 0.82rem;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .reader-title {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
    color: var(--text);
  }

  .reader-meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .reader-link {
    font-size: 0.78rem;
    color: var(--accent2);
    text-decoration: none;
    border-bottom: 1px solid rgba(83,52,131,.4);
    transition: border-color .12s;
  }
  .reader-link:hover { border-color: var(--accent2); }

  .reader-text {
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
  }

  .reader-text p {
    margin-bottom: 1.2em;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }
  .empty-state .icon { font-size: 3rem; }
  .empty-state p { font-size: 0.88rem; line-height: 1.6; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── ANALYSIS MODAL ── */
  .header-icon-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px; height: 26px;
    padding: 0; font-size: 0.95rem; line-height: 1;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .header-icon-btn:hover { color: var(--accent); border-color: var(--accent2); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 92vw; max-width: 1100px;
    height: 86vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    flex-shrink: 0;
  }
  .tabs { display: flex; gap: 2px; }
  .tab {
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 16px;
    font-size: 0.85rem; cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .modal-close {
    background: transparent; color: var(--text-dim);
    border: none; padding: 6px 12px;
    font-size: 1.1rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body {
    flex: 1; overflow: auto; padding: 18px 22px;
  }
  .tab-panel[hidden] { display: none; }

  /* Stats */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-card .label {
    font-size: 0.7rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 1.4rem; font-weight: 600; color: var(--accent);
  }
  .stat-tables {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
  }
  .stat-tables h3 {
    font-size: 0.78rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .stat-row b { color: var(--accent); font-weight: 600; }

  /* Top words */
  .word-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .word-bar:hover .word-label { color: var(--accent); }
  .word-label { flex: 0 0 160px; }
  .word-bar-track {
    flex: 1; height: 14px;
    background: var(--bg);
    border-radius: 3px; overflow: hidden;
  }
  .word-bar-fill {
    height: 100%;
    background: var(--accent2);
  }
  .word-count {
    flex: 0 0 60px; text-align: right;
    color: var(--text-dim); font-size: 0.78rem;
  }

  /* Map (tile-grid) */
  .map-wrap { display: flex; gap: 20px; align-items: flex-start; }
  .map-grid {
    display: grid;
    grid-template-columns: repeat(6, 62px);
    grid-auto-rows: 42px;
    gap: 4px;
    flex-shrink: 0;
  }
  .map-tile {
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: transform .1s, border-color .15s;
    user-select: none;
    text-align: center;
    padding: 0 2px;
  }
  .map-tile.empty { color: var(--text-dim); cursor: default; opacity: .5; }
  .map-tile:not(.empty):hover { transform: scale(1.08); border-color: var(--accent); z-index: 2; }
  .map-list {
    flex: 1;
    max-height: 60vh; overflow-y: auto;
  }
  .map-list .stat-row { cursor: pointer; }
  .map-list .stat-row:hover { background: var(--hover); }

  /* Timeline */
  .timeline-wrap { width: 100%; }
  .timeline-svg { width: 100%; height: 320px; display: block; }
  .timeline-bar { cursor: pointer; transition: opacity .15s; }
  .timeline-bar:hover { opacity: .75; }
  .timeline-legend { display: flex; gap: 16px; padding: 10px 0; font-size: 0.8rem; }
  .timeline-legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

  /* Match nav in reader */
  .match-nav {
    display: flex; align-items: center; gap: 4px;
    margin-left: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 4px;
  }
  .match-nav[hidden] { display: none; }
  .match-nav button {
    background: transparent; color: var(--text);
    border: none; padding: 3px 8px;
    cursor: pointer; border-radius: 3px;
    font-size: 0.9rem;
  }
  .match-nav button:hover { background: var(--hover); color: var(--accent); }
  .match-nav button:disabled { opacity: .35; cursor: default; }
  .match-nav .counter {
    font-size: 0.75rem; color: var(--text-dim);
    padding: 0 4px;
    min-width: 50px; text-align: center;
  }
  mark.current { background: var(--accent); color: var(--bg); }

  /* Search tip */
  .search-tip {
    position: absolute;
    top: calc(100% + 4px); left: 0; right: 0;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;

  /* Map tooltip */

  /* ── SPLASH DE CARGA ── */
  #splash {

    display: flex;
    align-items: center;
    justify-content: center;

  #splash.fade-out { opacity: 0; pointer-events: none; }

  #splash .splash-logo {

  #splash .splash-logo span { color: var(--accent); }

  #splash .splash-subtitle {

  #splash .splash-bar {
    width: min(420px, 70vw);
    height: 8px;
    background: var(--panel2);
    border: 1px solid var(--border);

    overflow: hidden;
    position: relative;
  }
  #splash .splash-bar-fill {
    position: absolute;
    inset: 0;

  }
  /* Spinner indeterminado (cuando no hay Content-Length) */
  #splash.indeterminate .splash-bar-fill {
    width: 35%;
    animation: splash-slide 1.1s ease-in-out infinite;
  }
  @keyframes splash-slide {

  }

  #splash .splash-status {

    font-variant-numeric: tabular-nums;

  #splash.error .splash-status { color: #e57373; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">dis<span>Kursos</span> · CFK</div>
  <div class="splash-subtitle">Explorador de discursos de Cristina y Néstor Kirchner</div>

<header>
  <div class="logo">dis<span>Kursos</span> · CFK</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput"

<!-- ── Analysis modal ── -->

  <div class="modal">

<div class="layout">

  <!-- Sidebar -->

<script>
// ─── DATOS ───────────────────────────────────────────────────────────────────

let speeches     = [];
let tree         = {};      // { speaker: { year: { month: [speech, ...] } } }
let filter       = 'all';   // 'all' | speaker | 'speaker/YYYY' | 'speaker/YYYY-MM'
let openSpeakers = {};      // speaker → bool (default: true)
let sortOrder    = 'desc';  // 'desc' | 'asc' | 'alpha'
let searchQ      = '';
let page         = 0;
const PAGE_SZ    = 50;

let editMode      = false;
let fileHandle    = null;
let shortFilter   = false;
let selectedUrls  = new Set();

let dupFilter     = false;
let dupGroups     = null;          // [[url, url, ...], ...] o null si no se computó
let dupUrlToGroup = new Map();
let dupComputing  = false;

let _analysisCache = { stats:null, words:null, map:false, timeline:false };
let _readerMarks = [], _readerMarkIdx = 0;
let _currentTab = 'stats';

const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio',
                   'julio','agosto','septiembre','octubre','noviembre','diciembre'];

const MONTHS_LONG = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                     'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ─── INIT ─────────────────────────────────────────────────────────────────────

function fmtMB(bytes) {
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function hideSplash() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  splash.classList.add('fade-out');
  setTimeout(() => splash.hidden = true, 400);
}

async function init() {
  const splash    = document.getElementById('splash');
  const fillEl    = document.getElementById('splashBarFill');
  const statusEl  = document.getElementById('splashStatus');

  try {
    const r = await fetch('discursos.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    // Con CDN + gzip, Content-Length suele venir como tamaño comprimido,
    // pero alcanza para una barra de progreso útil. Si no viene, vamos
    // a modo indeterminado.
    const lenHeader = r.headers.get('Content-Length');
    const total = lenHeader ? parseInt(lenHeader, 10) : 0;

    if (!total) splash.classList.add('indeterminate');

    const reader = r.body.getReader();
    const chunks = [];
    let received = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;

      if (total) {
        const pct = Math.min(100, (received / total) * 100);
        fillEl.style.width = pct.toFixed(1) + '%';
        statusEl.textContent = `Descargando… ${fmtMB(received)} / ${fmtMB(total)} (${pct.toFixed(0)}%)`;
      } else {
        statusEl.textContent = `Descargando… ${fmtMB(received)}`;
      }
    }

    statusEl.textContent = 'Procesando…';
    splash.classList.remove('indeterminate');
    fillEl.style.width = '100%';

    // Dar un tick al browser para que pinte el 100% antes del parse (bloqueante)
    await new Promise(res => setTimeout(res, 30));

    const blob = new Blob(chunks);
    const text = await blob.text();
    speeches = JSON.parse(text);

    onLoaded();
    hideSplash();
  } catch(e) {
    console.error('Error cargando discursos.json:', e);
    splash.classList.add('error');
    statusEl.textContent = 'No se pudo cargar automáticamente. Probá seleccionar el archivo manualmente.';
    setTimeout(() => {
      hideSplash();
      showLoadButton();
    }, 1500);
  }
}

function showLoadButton() {
  document.getElementById('loadingPanel').innerHTML = `
    <div class="empty-state">
      <div class="icon">📂</div>
      <p>Seleccioná el archivo <code>discursos.json</code> para comenzar.<br>
      <small style="color:var(--text-dim)">(Cuando uses el servidor HTTP se carga automáticamente)</small></p>
      <label style="
        display:inline-flex; align-items:center; gap:8px;
        margin-top:12px; padding:9px 18px;
        background:var(--accent2); color:#fff;
        border-radius:8px; font-size:0.88rem; font-weight:600;
        cursor:pointer; border:1px solid var(--border);
        transition:opacity .15s;">
        📥 Cargar discursos.json
        <input type="file" accept=".json" style="display:none" onchange="loadFromFile(event)">
      </label>
    </div>`;
}

function loadFromFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      speeches = JSON.parse(ev.target.result);
      onLoaded();
    } catch(err) {
      document.getElementById('loadingPanel').innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <p>El archivo no es un JSON válido.<br>
          <small style="color:var(--text-dim)">${err.message}</small></p>
        </div>`;
    }
  };
  reader.readAsText(file);
}

function onLoaded() {
  buildTree();
  buildLocationIndexes();
  populateHeaderFilters();
  refreshHeaderFilterAvailability();
  document.getElementById('loadingPanel').style.display = 'none';
  document.getElementById('browsePanel').style.display  = 'flex';
  renderSidebar();
  renderList();
}

// ─── ÁRBOL ────────────────────────────────────────────────────────────────────

function buildTree() {
  tree = {};
  for (const s of speeches) {
    if (!s.date || s.date.length < 6) continue;
    const sp = s.speaker || 'Sin speaker';
    const y  = s.date.slice(0,4);
    const m  = s.date.slice(4,6);
    if (!tree[sp])       tree[sp] = {};
    if (!tree[sp][y])    tree[sp][y] = {};
    if (!tree[sp][y][m]) tree[sp][y][m] = [];
    tree[sp][y][m].push(s);
  }
}

function countYear(sp, y) {
  return Object.values((tree[sp]||{})[y] || {}).reduce((s,a) => s+a.length, 0);
}

function countSpeaker(sp) {
  return Object.values(tree[sp]||{}).reduce((t,ym) =>
    t + Object.values(ym).reduce((s,a) => s+a.length, 0), 0);
}

let openYears = {};  // 'speaker/YYYY' → bool

const SPEAKER_ORDER = ['Cristina', 'Néstor'];

function renderSidebar() {
  const speakers = SPEAKER_ORDER.filter(sp => tree[sp]);
  let html = `
    <div class="tree-item ${filter==='all'?'active':''}" onclick="setFilter('all')">
      <span class="tree-toggle" style="visibility:hidden">▶</span>
      <span class="tree-icon">📚</span>
      <span class="tree-label">Todos</span>
      <span class="tree-count">${speeches.length}</span>
    </div>`;

  for (const sp of speakers) {
    const spOpen = openSpeakers[sp] !== false;  // default open
    const years  = Object.keys(tree[sp]).sort((a,b) => b-a);

    html += `
      <div>
        <div class="tree-item ${filter===sp?'active':''}" onclick="toggleSpeaker('${sp}')">
          <span class="tree-toggle ${spOpen?'open':''}">▶</span>
          <span class="tree-icon">📁</span>
          <span class="tree-label">${sp}</span>
          <span class="tree-count">${countSpeaker(sp)}</span>
        </div>
        <div class="tree-months ${spOpen?'open':''}">`;

    for (const y of years) {
      const yKey   = `${sp}/${y}`;
      const isOpen = openYears[yKey] !== false;  // default open
      const months = Object.keys(tree[sp][y]).sort((a,b) => b-a);

      html += `
          <div>
            <div class="tree-item ${filter===yKey?'active':''}" onclick="toggleYear('${sp}','${y}')">
              <span class="tree-toggle ${isOpen?'open':''}">▶</span>
              <span class="tree-icon">📁</span>
              <span class="tree-label">${y}</span>
              <span class="tree-count">${countYear(sp,y)}</span>
            </div>
            <div class="tree-months ${isOpen?'open':''}">`;

      for (const m of months) {
        const key   = `${sp}/${y}-${m}`;
        const mName = MONTHS_LONG[parseInt(m)-1] || m;
        html += `
              <div class="tree-item ${filter===key?'active':''}" onclick="setFilter('${key}')">
                <span class="tree-toggle" style="visibility:hidden">▶</span>
                <span class="tree-icon">📄</span>
                <span class="tree-label">${mName}</span>
                <span class="tree-count">${tree[sp][y][m].length}</span>
              </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }

  document.getElementById('sidebarTree').innerHTML = html;
}

function toggleSpeaker(sp) {
  if (openSpeakers[sp] === undefined) openSpeakers[sp] = false;
  else openSpeakers[sp] = !openSpeakers[sp];
  if (!openSpeakers[sp] && filter.startsWith(sp+'/')) setFilter(sp);
  else renderSidebar();
}

function toggleYear(sp, y) {
  const key = `${sp}/${y}`;
  if (openYears[key] === undefined) openYears[key] = false;
  else openYears[key] = !openYears[key];
  if (!openYears[key] && filter.startsWith(key+'-')) setFilter(`${sp}/${y}`);
  else renderSidebar();
}

// ─── FILTRO Y SORT ────────────────────────────────────────────────────────────

function setFilter(f) {
  filter = f;
  page = 0;
  document.getElementById('searchInput').value = '';
  searchQ = '';
  document.getElementById('readerPanel').style.display = 'none';
  document.getElementById('browsePanel').style.display = 'flex';
  if (editMode) { selectedUrls.clear(); updateDeleteBtn(); }
  refreshHeaderFilterAvailability();
  renderSidebar();
  renderList();
}

function setSort(o) {
  sortOrder = o;
  page = 0;
  document.querySelectorAll('.sort-btn').forEach((b,i) =>
    b.classList.toggle('active', ['desc','asc','alpha'][i] === o));
  renderList();
}

function getFiltered() {
  if (filter === 'all') return speeches;
  // filter = 'speaker' | 'speaker/YYYY' | 'speaker/YYYY-MM'
  const slashIdx = filter.indexOf('/');
  if (slashIdx === -1) {
    // solo speaker
    return speeches.filter(s => s.speaker === filter);
  }
  const sp   = filter.slice(0, slashIdx);
  const rest = filter.slice(slashIdx + 1);  // 'YYYY' o 'YYYY-MM'
  let list   = speeches.filter(s => s.speaker === sp);
  if (rest.includes('-')) {
    const [y, m] = rest.split('-');
    return list.filter(s => s.date && s.date.slice(0,4)===y && s.date.slice(4,6)===m);
  }
  return list.filter(s => s.date && s.date.slice(0,4)===rest);
}

// ─── FILTROS DEL HEADER (orador, año, mes, día) ────────────────────────────
let hSpeaker = '', hYear = '', hMonth = '', hDay = '', hProvincia = '', hLocalidad = '';

function populateHeaderFilters() {
  const years = new Set();
  for (const s of speeches) {
    if (s.date && s.date.length >= 4) years.add(s.date.slice(0,4));
  }
  const ySel = document.getElementById('hYear');
  ySel.innerHTML = '<option value="">Año</option>' +
    [...years].sort().reverse().map(y => `<option value="${y}">${y}</option>`).join('');

  const mSel = document.getElementById('hMonth');
  mSel.innerHTML = '<option value="">Mes</option>' +
    MONTHS_LONG.map((name,i) => `<option value="${String(i+1).padStart(2,'0')}">${name}</option>`).join('');

  const dSel = document.getElementById('hDay');
  let dHtml = '<option value="">Día</option>';
  for (let d=1; d<=31; d++) dHtml += `<option value="${String(d).padStart(2,'0')}">${d}</option>`;
  dSel.innerHTML = dHtml;

  const provincias = new Set();
  for (const s of speeches) if (s.provincia) provincias.add(s.provincia);
  const provs = [...provincias].sort((a,b) => {
    if (a === 'Internacional') return 1;
    if (b === 'Internacional') return -1;
    return a.localeCompare(b, 'es', { sensitivity: 'base' });
  });
  const pSel = document.getElementById('hProvincia');
  pSel.innerHTML = '<option value="">Provincia</option>' +
    provs.map(p => `<option value="${escHtml(p)}">${escHtml(p)}</option>`).join('');

  populateLocalidadOptions();
}

function populateLocalidadOptions() {
  const lSel = document.getElementById('hLocalidad');
  if (!hProvincia) {
    lSel.innerHTML = '<option value="">Localidad</option>';
    lSel.disabled = true;
    hLocalidad = '';
    lSel.classList.remove('active');
    return;
  }
  const isIntl = hProvincia === 'Internacional';
  const placeholder = isIntl ? 'País' : 'Localidad';
  const values = new Set();
  for (const s of speeches) {
    if (s.provincia !== hProvincia) continue;
    const v = isIntl ? s.pais : s.localidad;
    if (v) values.add(v);
  }
  const sorted = [...values].sort((a,b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));
  lSel.innerHTML = `<option value="">${placeholder}</option>` +
    sorted.map(v => `<option value="${escHtml(v)}">${escHtml(v)}</option>`).join('');
  lSel.disabled = false;
  if (hLocalidad && !values.has(hLocalidad)) {
    hLocalidad = '';
    lSel.value = '';
  } else {
    lSel.value = hLocalidad;
  }
}

function applyHeaderFilters(list) {
  if (hSpeaker)   list = list.filter(s => s.speaker === hSpeaker);
  if (hYear)      list = list.filter(s => s.date && s.date.slice(0,4) === hYear);
  if (hMonth)     list = list.filter(s => s.date && s.date.slice(4,6) === hMonth);
  if (hDay)       list = list.filter(s => s.date && s.date.slice(6,8) === hDay);
  if (hProvincia) list = list.filter(s => s.provincia === hProvincia);
  if (hLocalidad) {
    const key = hProvincia === 'Internacional' ? 'pais' : 'localidad';
    list = list.filter(s => s[key] === hLocalidad);
  }
  return list;
}

// Lista base (sidebar + búsqueda aplicados, sin filtros del header) para
// calcular qué opciones de los selects son válidas dado el contexto.
function getBaseListForAvailability() {
  const pq = getParsedQuery();
  let list;
  if (pq.groups) {
    list = speeches.filter(s => matchesQuery(s, pq.groups));
  } else {
    list = getFiltered();
  }
  return list;
}

function refreshHeaderFilterAvailability() {
  const base = getBaseListForAvailability();
  const sels = [
    { id: 'hSpeaker',   accessor: s => s.speaker,                       skip: 'speaker'   },
    { id: 'hYear',      accessor: s => s.date && s.date.slice(0,4),     skip: 'year'      },
    { id: 'hMonth',     accessor: s => s.date && s.date.slice(4,6),     skip: 'month'     },
    { id: 'hDay',       accessor: s => s.date && s.date.slice(6,8),     skip: 'day'       },
    { id: 'hProvincia', accessor: s => s.provincia,                     skip: 'provincia' },
    { id: 'hLocalidad', accessor: s => (hProvincia === 'Internacional' ? s.pais : s.localidad), skip: 'localidad' },
  ];
  let mutated = false;
  for (const sel of sels) {
    // aplicar los OTROS filtros (todos menos el suyo)
    let filtered = base;
    if (sel.skip !== 'speaker'   && hSpeaker)   filtered = filtered.filter(s => s.speaker === hSpeaker);
    if (sel.skip !== 'year'      && hYear)      filtered = filtered.filter(s => s.date && s.date.slice(0,4) === hYear);
    if (sel.skip !== 'month'     && hMonth)     filtered = filtered.filter(s => s.date && s.date.slice(4,6) === hMonth);
    if (sel.skip !== 'day'       && hDay)       filtered = filtered.filter(s => s.date && s.date.slice(6,8) === hDay);
    if (sel.skip !== 'provincia' && hProvincia) filtered = filtered.filter(s => s.provincia === hProvincia);
    if (sel.skip !== 'localidad' && hLocalidad) {
      const key = hProvincia === 'Internacional' ? 'pais' : 'localidad';
      filtered = filtered.filter(s => s[key] === hLocalidad);
    }
    const validVals = new Set(filtered.map(sel.accessor).filter(Boolean));
    const el = document.getElementById(sel.id);
    for (const opt of el.options) {
      opt.disabled = opt.value !== '' && !validVals.has(opt.value);
    }
    // si el valor actual quedó inválido, resetear
    if (el.value && !validVals.has(el.value)) {
      el.value = '';
      if (sel.id === 'hSpeaker')   hSpeaker   = '';
      if (sel.id === 'hYear')      hYear      = '';
      if (sel.id === 'hMonth')     hMonth     = '';
      if (sel.id === 'hDay')       hDay       = '';
      if (sel.id === 'hProvincia') hProvincia = '';
      if (sel.id === 'hLocalidad') hLocalidad = '';
      mutated = true;
    }
    el.classList.toggle('active', !!el.value);
  }
  return mutated;
}

function onHeaderFilterChange() {
  const prevProvincia = hProvincia;
  hSpeaker   = document.getElementById('hSpeaker').value;
  hYear      = document.getElementById('hYear').value;
  hMonth     = document.getElementById('hMonth').value;
  hDay       = document.getElementById('hDay').value;
  hProvincia = document.getElementById('hProvincia').value;
  hLocalidad = document.getElementById('hLocalidad').value;
  if (hProvincia !== prevProvincia) populateLocalidadOptions();
  page = 0;
  refreshHeaderFilterAvailability();
  renderList();
}

function clearHeaderFilters() {
  hSpeaker = hYear = hMonth = hDay = hProvincia = hLocalidad = '';
  for (const id of ['hSpeaker','hYear','hMonth','hDay','hProvincia','hLocalidad']) {
    const el = document.getElementById(id);
    el.value = '';
    el.classList.remove('active');
  }
  populateLocalidadOptions();
  page = 0;
  refreshHeaderFilterAvailability();
  renderList();
}

function sortList(list) {
  return [...list].sort((a,b) => {
    if (sortOrder === 'alpha') return (a.title||'').localeCompare(b.title||'', 'es', {sensitivity:'base'});
    const da = a.date||'0', db = b.date||'0';
    return sortOrder === 'desc' ? db.localeCompare(da) : da.localeCompare(db);
  });
}

// ── Persistencia del FileHandle en IndexedDB ────────────────────────────────
function _idb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('explorador-discursos', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
async function saveFileHandle(handle) {
  const db = await _idb();
  const tx = db.transaction('handles', 'readwrite');
  tx.objectStore('handles').put(handle, 'discursos');
  return new Promise(r => tx.oncomplete = r);
}
async function loadFileHandle() {
  const db = await _idb();
  const tx = db.transaction('handles', 'readonly');
  return new Promise(r => {
    const req = tx.objectStore('handles').get('discursos');
    req.onsuccess = () => r(req.result || null);
    req.onerror   = () => r(null);
  });
}
async function ensureWritePermission(handle) {
  const opts = { mode: 'readwrite' };
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  if ((await handle.requestPermission(opts)) === 'granted') return true;
  return false;
}

async function toggleEditMode() {
  if (!editMode) {
    // Intentar reutilizar handle guardado
    if (!fileHandle) fileHandle = await loadFileHandle();
    if (fileHandle && !(await ensureWritePermission(fileHandle))) {
      fileHandle = null;
    }
    if (!fileHandle) {
      try {
        [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
        });
        await saveFileHandle(fileHandle);
      } catch(e) {
        return;  // usuario canceló
      }
    }
    editMode = true;
  } else {
    editMode = false;
    selectedUrls.clear();
    // fileHandle se conserva para próximas activaciones
  }
  document.getElementById('editModeBtn').classList.toggle('edit-active', editMode);
  document.getElementById('selectAllBtn').style.display    = editMode ? '' : 'none';
  document.getElementById('tagLocationsBtn').style.display = editMode ? '' : 'none';
  updateDeleteBtn();
  renderList();
}

function toggleShortFilter() {
  shortFilter = !shortFilter;
  document.getElementById('shortFilterBtn').classList.toggle('active', shortFilter);
  selectedUrls.clear();
  page = 0;
  updateDeleteBtn();
  renderList();
}

function toggleSelect(idx, cardEl) {
  const url = speeches[idx] && speeches[idx].url;
  if (!url) return;
  const willSelect = !selectedUrls.has(url);
  if (willSelect) selectedUrls.add(url);
  else selectedUrls.delete(url);
  if (cardEl) {
    cardEl.classList.toggle('selected', willSelect);
    const check = cardEl.querySelector('.card-check');
    if (check) check.textContent = willSelect ? '✓' : '';
  }
  updateDeleteBtn();
}

function getVisibleList() {
  const pq = getParsedQuery();
  let list;
  if (pq.groups) {
    list = speeches.filter(s => matchesQuery(s, pq.groups));
  } else {
    list = getFiltered();
  }
  list = applyHeaderFilters(list);
  if (shortFilter) {
    list = list.filter(s => {
      const wc = s.text ? s.text.trim().split(/\s+/).filter(Boolean).length : 0;
      return wc < 300;
    });
  }
  if (dupFilter && dupGroups) {
    list = list.filter(s => dupUrlToGroup.has(s.url));
    list.sort((a, b) => {
      const ga = dupUrlToGroup.get(a.url);
      const gb = dupUrlToGroup.get(b.url);
      if (ga !== gb) return ga - gb;
      return (a.date || '').localeCompare(b.date || '');
    });
  }
  return list;
}

function toggleSelectAllVisible() {
  const visible = getVisibleList();
  if (visible.length === 0) return;
  const allSelected = visible.every(s => selectedUrls.has(s.url));
  if (allSelected) {
    visible.forEach(s => selectedUrls.delete(s.url));
  } else {
    visible.forEach(s => selectedUrls.add(s.url));
  }
  updateDeleteBtn();
  renderList();
}

function updateDeleteBtn() {
  const n     = selectedUrls.size;
  const visible = editMode && n > 0;
  const dBtn  = document.getElementById('deleteSelectedBtn');
  dBtn.style.display = visible ? '' : 'none';
  dBtn.textContent   = `✕ Eliminar ${n} seleccionado${n !== 1 ? 's' : ''}`;
  const eBtn  = document.getElementById('editLocationBtn');
  if (eBtn) {
    eBtn.style.display = visible ? '' : 'none';
    eBtn.textContent   = `🗺 Editar ubicación (${n})`;
  }
}

function editSelectedLocations() {
  const indices = [];
  speeches.forEach((s, i) => { if (selectedUrls.has(s.url)) indices.push(i); });
  if (!indices.length) return;
  openLocationEditor(indices);
}

async function deleteSelected() {
  const n = selectedUrls.size;
  if (!confirm(`¿Eliminar ${n} discurso${n !== 1 ? 's' : ''} del archivo?`)) return;
  speeches = speeches.filter(s => !selectedUrls.has(s.url));
  selectedUrls.clear();
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify(speeches, null, 2));
  await writable.close();
  // Invalidar caché de duplicados
  dupGroups = null;
  dupUrlToGroup = new Map();
  if (dupFilter) {
    dupFilter = false;
    const db = document.getElementById('dupBtn');
    db.classList.remove('active');
    db.textContent = '🔍 Duplicados';
  }
  updateDeleteBtn();
  invalidateAnalysisCache();
  buildTree();
  renderSidebar();
  renderList();
}

// ─── DETECCIÓN DE DUPLICADOS ──────────────────────────────────────────────────

function fnvHash(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h | 0;
}

function normalizeForDedup(t) {
  return norm(t).replace(/[^\w\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

function getShingles(words, k = 5) {
  const set = new Set();
  if (words.length < k) {
    if (words.length) set.add(fnvHash(words.join(' ')));
    return set;
  }
  for (let i = 0; i + k <= words.length; i++) {
    set.add(fnvHash(words.slice(i, i + k).join(' ')));
  }
  return set;
}

function jaccard(a, b) {
  if (!a.size || !b.size) return 0;
  const [small, large] = a.size < b.size ? [a, b] : [b, a];
  let inter = 0;
  for (const v of small) if (large.has(v)) inter++;
  return inter / (a.size + b.size - inter);
}

async function computeDuplicates() {
  const docs = speeches.map((s, i) => {
    const n     = normalizeForDedup(s.text || '');
    const words = n ? n.split(' ') : [];
    return { i, url: s.url, words, len: words.length, shingles: getShingles(words) };
  });

  const parent = docs.map((_, i) => i);
  const find   = x => parent[x] === x ? x : (parent[x] = find(parent[x]));
  const union  = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; };

  // 1) Exactos
  const exact = new Map();
  for (const d of docs) {
    if (d.len === 0) continue;
    const h = fnvHash(d.words.join(' '));
    if (exact.has(h)) union(exact.get(h), d.i);
    else exact.set(h, d.i);
  }

  // 2) Near-duplicates con Jaccard, pre-filtrando por longitud
  for (let i = 0; i < docs.length; i++) {
    const a = docs[i];
    if (a.len < 5) continue;
    for (let j = i + 1; j < docs.length; j++) {
      const b = docs[j];
      if (b.len < 5) continue;
      const maxLen = Math.max(a.len, b.len);
      if (Math.abs(a.len - b.len) / maxLen > 0.12) continue;
      if (find(a.i) === find(b.i)) continue;
      if (jaccard(a.shingles, b.shingles) >= 0.85) union(a.i, b.i);
    }
    if (i % 50 === 0) await new Promise(r => setTimeout(r, 0));
  }

  const groupsByRoot = new Map();
  for (let i = 0; i < docs.length; i++) {
    const r = find(i);
    if (!groupsByRoot.has(r)) groupsByRoot.set(r, []);
    groupsByRoot.get(r).push(docs[i].url);
  }
  const groups = [...groupsByRoot.values()].filter(g => g.length >= 2);

  dupGroups     = groups;
  dupUrlToGroup = new Map();
  groups.forEach((g, idx) => g.forEach(url => dupUrlToGroup.set(url, idx)));
}

async function toggleDuplicates() {
  if (dupComputing) return;
  const btn = document.getElementById('dupBtn');
  if (!dupFilter) {
    if (!dupGroups) {
      dupComputing = true;
      btn.textContent = '⏳ Buscando…';
      btn.disabled    = true;
      await new Promise(r => setTimeout(r, 0));
      await computeDuplicates();
      btn.disabled    = false;
      dupComputing    = false;
    }
    dupFilter = true;
  } else {
    dupFilter = false;
  }
  btn.classList.toggle('active', dupFilter);
  btn.textContent = dupFilter
    ? `🔍 Duplicados (${dupGroups.length} grupos)`
    : '🔍 Duplicados';
  page = 0;
  selectedUrls.clear();
  updateDeleteBtn();
  renderList();
}

function variants(base, kind) {
  if (kind === 'oa') {
    if (base.endsWith('és')) {
      const stem = base.slice(0, -2);
      return [stem + 'és', stem + 'esa', stem + 'eses', stem + 'esas'];
    }
    if (base.endsWith('o')) {
      const stem = base.slice(0, -1);
      return [stem + 'o', stem + 'a', stem + 'os', stem + 'as'];
    }
    return [base];
  }
  if (kind === 'ense') return [base, base + 's'];
  return [base];
}

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// Normalizador para detección de ubicación: preserva ñ (a diferencia de norm,
// que la convierte en n). Necesario para distinguir "Campaña" de "Campana".
function normLoc(s) {
  return (s||'')
    .replace(/ñ/g, '').replace(/Ñ/g, '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .replace(//g, 'ñ');
}

let MUNI_REGEX = null, MUNI_LOOKUP = null, PROV_REGEX = null, PROV_LOOKUP = null;

function buildLocationIndexes() {
  const muniSorted = [...MUNI_DATA].sort((a, b) => b.name.length - a.name.length);
  MUNI_LOOKUP = new Map(MUNI_DATA.map(m => [normLoc(m.name), m]));
  MUNI_REGEX  = new RegExp(`\\b(${muniSorted.map(m => escRe(normLoc(m.name))).join('|')})\\b`, 'gi');

  PROV_LOOKUP = new Map(PROVINCES.map(p => [normLoc(p), p]));
  for (const [k, v] of Object.entries(PROVINCE_ALIASES)) PROV_LOOKUP.set(normLoc(k), v);
  for (const [prov, demos] of Object.entries(DEMONYMS_BY_PROVINCE)) {
    for (const d of demos) PROV_LOOKUP.set(normLoc(d), prov);
  }

  const allProv = [
    ...PROVINCES,
    ...Object.keys(PROVINCE_ALIASES),
    ...Object.values(DEMONYMS_BY_PROVINCE).flat(),
  ].sort((a, b) => b.length - a.length);
  PROV_REGEX = new RegExp(`\\b(${allProv.map(p => escRe(normLoc(p))).join('|')})\\b`, 'i');
}

function expandAbbrev(t) {
  // \bgral\b no funciona si sigue un punto (".\s" no es boundary). Usamos lookahead.
  return t
    .replace(/\bgral\.?(?=\s|$)/g, 'general')
    .replace(/\bpcia\.?(?=\s|$)/g, 'provincia');
}

function detectLocation(title) {
  if (!title || !MUNI_REGEX) return { provincia: null, localidad: null, pais: null, institucion: null };
  const t = expandAbbrev(normLoc(title));

  for (const o of PHRASE_OVERRIDES) {
    if (o.pattern.test(t)) return {
      provincia:   o.provincia,
      localidad:   o.localidad   ?? null,
      pais:        o.pais        ?? null,
      institucion: o.institucion ?? null,
    };
  }

  const p = t.match(PROV_REGEX);
  const provInTitle = p ? PROV_LOOKUP.get(p[1].toLowerCase()) : null;

  const matches = [...t.matchAll(MUNI_REGEX)];
  for (const m of matches) {
    const hit = MUNI_LOOKUP.get(m[1].toLowerCase());
    if (!hit) continue;
    if (hit.requiresProv && provInTitle !== hit.prov) continue;
    return { provincia: hit.prov, localidad: hit.name, pais: null, institucion: null };
  }

  if (provInTitle) return { provincia: provInTitle, localidad: null, pais: null, institucion: null };

  return { provincia: null, localidad: null, pais: null, institucion: null };
}

async function tagLocations() {
  let withProv = 0, withMuni = 0, withPais = 0, withInst = 0;
  for (const s of speeches) {
    const { provincia, localidad, pais, institucion } = detectLocation(s.title);
    s.provincia   = provincia;
    s.localidad   = localidad;
    s.pais        = pais;
    s.institucion = institucion;
    // Override: Cristina desde 2025-06-18 → institución "San José 1111" (prisión domiciliaria).
    if (s.speaker === 'Cristina' && s.date && s.date >= '20250618') {
      s.institucion = 'San José 1111';
    }
    if (provincia)   withProv++;
    if (localidad)   withMuni++;
    if (pais)        withPais++;
    if (s.institucion) withInst++;
  }
  if (!confirm(`Detectados ${withProv} con provincia (${withMuni} localidad, ${withPais} país, ${withInst} institución).\n¿Guardar en discursos.json?`)) {
    renderList();
    return;
  }
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify(speeches, null, 2));
  await writable.close();
  invalidateAnalysisCache();
  renderList();
}

        <input type="text" id="locEdPais" list="locEdPaisList" autocomplete="off">

      </label>
      <label>${applyBox('loc')} Localidad
        <input type="text" id="locEdLoc" list="locEdLocList" autocomplete="off" placeholder="(opcional)">
        <datalist id="locEdLocList"></datalist>
      </label>
      <label>${applyBox('inst')} Institución
        <input type="text" id="locEdInst" list="locEdInstList" autocomplete="off" placeholder="(opcional)">
        <datalist id="locEdInstList">${allInst.map(p => `<option value="${escHtml(p)}">`).join('')}</datalist>
      </label>
      <div class="editor-buttons">
        ${bulk ? '' : '<button type="button" class="danger" id="locEdClear">Limpiar</button>'}
        <button type="button" id="locEdCancel">Cancelar</button>

  locInput.value  = initLoc;

    provSel.value === '__other__' ? provCustom.value.trim() : provSel.value;

  locInput.addEventListener('input',  () => autoCheck('loc'));

  refreshPaisVisibility();

      paisInput.value = '';
      locInput.value  = '';
      instInput.value = '';
      refreshLocList();
      refreshPaisVisibility();
    });
  }

  document.getElementById('locEdSave').addEventListener('click', async () => {
    const provVal = currentProvValue();
    const locVal  = locInput.value.trim();
    const paisVal = (provVal === 'Internacional') ? paisInput.value.trim() : '';
    const instVal = instInput.value.trim();

    if (bulk) {
      const checked = (f) => overlay.querySelector(`.apply-check[data-field="${f}"]`).checked;
      const apply = {
        prov: checked('prov'),
        loc:  checked('loc'),
        pais: checked('pais'),
        inst: checked('inst'),
      };
      if (!apply.prov && !apply.loc && !apply.pais && !apply.inst) {
        alert('No hay campos marcados para aplicar. Marcá al menos uno.');
        return;
      }
      for (const it of items) {
        if (apply.prov) it.provincia   = provVal || null;
        if (apply.loc)  it.localidad   = locVal  || null;
        if (apply.pais) it.pais        = paisVal || null;
        if (apply.inst) it.institucion = instVal || null;
      }
    } else {
      s.provincia   = provVal  || null;
      s.localidad   = locVal   || null;
      s.pais        = paisVal  || null;
      s.institucion = instVal  || null;
    }

    if (!fileHandle) {
      alert('No hay archivo abierto para guardar. Activá modo edición primero.');
      return;
    }
    try {
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(speeches, null, 2));
      await writable.close();
      invalidateAnalysisCache();
      close();
      renderList();
    } catch (err) {
      alert('Error al guardar: ' + err.message);
    }
  });

  // Focus inicial en el select de provincia.
  provSel.focus();
}

// ─── BÚSQUEDA ─────────────────────────────────────────────────────────────────

let searchTimer = null;
function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = val.trim();
    page = 0;
    refreshHeaderFilterAvailability();
    renderList();
  }, 250);

function norm(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function countMatches(text, terms) {
  if (!terms || !text) return 0;
  const list = Array.isArray(terms) ? terms : [terms];
  const nt = norm(text);
  let n = 0;
  for (const t of list) {
    const nq = norm(t);
    if (!nq) continue;
    let i = 0;
    while ((i = nt.indexOf(nq, i)) !== -1) { n++; i += nq.length; }
  }
  return n;
}

function getSnippet(text, terms, radius=160) {
  if (!text) return '';
  const list = Array.isArray(terms) ? terms : (terms ? [terms] : []);
  if (!list.length) return text.slice(0, 220) + (text.length>220?'…':'');
  const nt = norm(text);
  let bestIdx = -1, bestLen = 0;
  for (const t of list) {
    const nq = norm(t);
    if (!nq) continue;
    const idx = nt.indexOf(nq);
    if (idx !== -1 && (bestIdx === -1 || idx < bestIdx)) { bestIdx = idx; bestLen = nq.length; }
  }
  if (bestIdx === -1) return text.slice(0, 220) + '…';
  const start = Math.max(0, bestIdx - radius);
  const end   = Math.min(text.length, bestIdx + bestLen + radius);
  return (start>0?'…':'') + text.slice(start,end) + (end<text.length?'…':'');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function highlight(text, terms) {
  if (!terms || !text) return escHtml(text);
  const list = (Array.isArray(terms) ? terms : [terms]).map(t => norm(t)).filter(Boolean);
  if (!list.length) return escHtml(text);
  const nText = norm(text);
  // Recolectar todas las posiciones (start, end) y mergear solapamientos.
  const ranges = [];
  for (const nq of list) {
    let i = 0;
    while ((i = nText.indexOf(nq, i)) !== -1) {
      ranges.push([i, i + nq.length]);
      i += nq.length;
    }
  }
  if (!ranges.length) return escHtml(text);
  ranges.sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  const merged = [ranges[0]];
  for (let k=1; k<ranges.length; k++) {
    const last = merged[merged.length-1];
    if (ranges[k][0] <= last[1]) last[1] = Math.max(last[1], ranges[k][1]);
    else merged.push(ranges[k]);
  }
  let result = '', cur = 0;
  for (const [a,b] of merged) {
    result += escHtml(text.slice(cur, a));
    result += '<mark>' + escHtml(text.slice(a, b)) + '</mark>';
    cur = b;
  }
  result += escHtml(text.slice(cur));
  return result;
}

// ─── PARSER DE BÚSQUEDA ─────────────────────────────────────────────────────
// Sintaxis: "frase", -excluir, a | b (OR), tokens sueltos = AND.

function parseQuery(raw) {
  const tokens = [];
  let i = 0;
  while (i < raw.length) {
    while (i < raw.length && raw[i] === ' ') i++;
    if (i >= raw.length) break;
    let neg = false;
    if (raw[i] === '-' && i+1 < raw.length && raw[i+1] !== ' ' && raw[i+1] !== '-') {
      neg = true; i++;
    }
    if (raw[i] === '"') {
      const end = raw.indexOf('"', i+1);
      if (end === -1) {
        tokens.push({type:'word', neg, val: raw.slice(i+1)});
        break;
      }
      tokens.push({type:'phrase', neg, val: raw.slice(i+1, end)});
      i = end+1;
    } else if (raw[i] === '|') {
      tokens.push({type:'or'});
      i++;
    } else {
      const m = raw.slice(i).match(/^[^\s]+/);
      if (!m) { i++; continue; }
      tokens.push({type:'word', neg, val: m[0]});
      i += m[0].length;
    }
  }
  const groups = [[]];
  for (const t of tokens) {
    if (t.type === 'or') groups.push([]);
    else groups[groups.length-1].push(t);
  }
  return groups.filter(g => g.length > 0);
}

function matchesQuery(s, groups) {
  if (!groups || !groups.length) return true;
  const hay = norm(s.title || '') + '  ' + norm(s.text || '');
  for (const g of groups) {
    const positives = g.filter(t => !t.neg);
    const negatives = g.filter(t =>  t.neg);
    if (positives.length) {
      const anyPos = positives.some(t => hay.includes(norm(t.val)));
      if (!anyPos) return false;
    }
    for (const n of negatives) {
      if (hay.includes(norm(n.val))) return false;
    }
  }
  return true;
}

function highlightTerms(groups) {
  if (!groups) return [];
  const out = [];
  for (const g of groups) {
    for (const t of g) {
      if (!t.neg && t.val) out.push(t.val);
    }
  }
  return out;
}

let _parsedQueryCache = { raw: null, groups: null, terms: [] };
function getParsedQuery() {
  if (_parsedQueryCache.raw === searchQ) return _parsedQueryCache;
  const groups = searchQ.length >= 3 ? parseQuery(searchQ) : null;
  _parsedQueryCache = {
    raw: searchQ,
    groups,
    terms: groups ? highlightTerms(groups) : [],
  };
  return _parsedQueryCache;
}

function fmtDate(d) {
  if (!d || d.length < 8) return d||'';
  const y = d.slice(0,4), m = parseInt(d.slice(4,6))-1, day = parseInt(d.slice(6,8));
  const mName = MONTHS_ES[m] || '';
  return `${day} de ${mName} de ${y}`;
}

function fmtSize(n) {
  if (!n) return '';
  if (n >= 1000) return (n/1000).toFixed(1)+'k chars';
  return n+' chars';
}

function readTime(n) {
  if (!n) return '';
  const mins = Math.max(1, Math.round(n/800));
  return `~${mins} min`;
}

// ─── RENDER LIST ──────────────────────────────────────────────────────────────

function renderList() {
  let list;
  let isSearch = false;
  const pq = getParsedQuery();

  if (pq.groups) {
    isSearch = true;
    list = speeches.filter(s => matchesQuery(s, pq.groups));
    list = list.map(s => ({
      ...s,
      _origIdx:      speeches.indexOf(s),
      _titleMatches: countMatches(s.title, pq.terms),
      _textMatches:  countMatches(s.text,  pq.terms),
    })).sort((a,b) => (b._titleMatches+b._textMatches) - (a._titleMatches+a._textMatches));
  } else {
    list = sortList(getFiltered());
  }

  // Filtros del header (orador / año / mes / día)
  list = applyHeaderFilters(list);

  // Filtro de discursos cortos
  if (shortFilter) {
    list = list.filter(s => {
      const wc = s.text ? s.text.trim().split(/\s+/).filter(Boolean).length : 0;
      return wc < 300;
    });
  }

  // Filtro de duplicados — agrupa visualmente por groupIdx, ignora el sort
  if (dupFilter && dupGroups) {
    list = list.filter(s => dupUrlToGroup.has(s.url));
    list.sort((a, b) => {
      const ga = dupUrlToGroup.get(a.url);
      const gb = dupUrlToGroup.get(b.url);
      if (ga !== gb) return ga - gb;
      return (a.date || '').localeCompare(b.date || '');
    });
  }

  // Breadcrumb
  let bc = '';
  if (isSearch) {
    bc = `Buscar: <b>"${escHtml(searchQ)}"</b>`;
  } else if (filter === 'all') {
    bc = '<b>Todos los discursos</b>';
  } else {
    const slashIdx = filter.indexOf('/');
    if (slashIdx === -1) {
      bc = `<b>${escHtml(filter)}</b>`;
    } else {
      const sp   = filter.slice(0, slashIdx);
      const rest = filter.slice(slashIdx + 1);
      if (rest.includes('-')) {
        const [y, m] = rest.split('-');
        bc = `${escHtml(sp)} <span>›</span> ${y} <span>›</span> <b>${MONTHS_LONG[parseInt(m)-1]}</b>`;
      } else {
        bc = `${escHtml(sp)} <span>›</span> <b>${rest}</b>`;
      }
    }
  }
  document.getElementById('breadcrumb').innerHTML = bc;

  // Results header (solo en búsqueda)
  const rh = document.getElementById('resultsHeader');
  if (isSearch) {
    rh.style.display = '';
    rh.innerHTML = `<b>${list.length.toLocaleString('es-AR')}</b> resultado${list.length!==1?'s':''} para <b>"${escHtml(searchQ)}"</b>`;
  } else {
    rh.style.display = 'none';
  }

  // Paginación
  const total = list.length;
  document.getElementById('headerMeta').innerHTML =
    `<b>${total.toLocaleString('es-AR')}</b> discursos`;
  const pages = Math.ceil(total / PAGE_SZ);
  if (page >= pages) page = Math.max(0, pages-1);
  const slice = list.slice(page*PAGE_SZ, (page+1)*PAGE_SZ);

  // Cards
  const listEl = document.getElementById('speechList');
  if (slice.length === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="icon">📭</div>
      <p>${isSearch ? `Sin resultados para "${escHtml(searchQ)}"` : 'Sin discursos en este período'}</p>
    </div>`;
  } else {
    listEl.innerHTML = slice.map((s,i) => {
      const titleHl = isSearch ? highlight(s.title, pq.terms) : escHtml(s.title);
      const snippet = getSnippet(s.text, isSearch?pq.terms:[]);
      const snippetHl = isSearch ? highlight(snippet, pq.terms) : escHtml(snippet);
      const matchPill   = isSearch && (s._textMatches>0) ? `<span class="pill match">${s._textMatches} coincidencia${s._textMatches!==1?'s':''}</span>` : '';
      const wc          = s.text ? s.text.trim().split(/\s+/).filter(Boolean).length : 0;
      const sizePill    = wc ? `<span class="pill">${wc.toLocaleString('es-AR')} palabras</span>` : '';
      const spClass     = s.speaker ? 'speaker-' + norm(s.speaker) : '';
      const speakerPill = s.speaker ? `<span class="pill ${spClass}">${escHtml(s.speaker)}</span>` : '';
      const origIdx     = s._origIdx !== undefined ? s._origIdx : speeches.indexOf(s);
      const editPill = (cls, val, label) => {
        if (editMode) {
          const klass = val ? `pill editable ${cls}` : 'pill editable placeholder';
          const txt   = val ? escHtml(val) : `+ ${label}`;
          return `<span class="${klass}" onclick="event.stopPropagation();openLocationEditor(${origIdx})">${txt}</span>`;
        }
        return val ? `<span class="pill ${cls}">${escHtml(val)}</span>` : '';
      };
      const provPill = editPill('location-prov', s.provincia,   'provincia');
      const locPill  = editPill('location-loc',  s.localidad,   'localidad');
      const paisPill = editPill('location-pais', s.pais,        'país');
      const instPill = editPill('location-inst', s.institucion, 'institución');
      const dupIdx      = dupFilter && dupUrlToGroup.has(s.url) ? dupUrlToGroup.get(s.url) : -1;
      const dupHue      = dupIdx >= 0 ? (dupIdx * 137) % 360 : 0;
      const dupPill     = dupIdx >= 0
        ? `<span class="pill dup-group" style="background:hsl(${dupHue},45%,25%);border-color:hsl(${dupHue},60%,45%);color:hsl(${dupHue},70%,80%)">Grupo ${dupIdx+1}</span>`
        : '';
      const isSelected  = selectedUrls.has(s.url);
      const checkBox    = editMode ? `<span class="card-check">${isSelected ? '✓' : ''}</span>` : '';
      const cardClass   = editMode ? (isSelected ? 'speech-card selectable selected' : 'speech-card selectable') : 'speech-card';
      const cardClick   = editMode
        ? `toggleSelect(${origIdx}, this)`
        : `openReader(${page*PAGE_SZ+i}, ${JSON.stringify(list.map(x=>x._origIdx!==undefined?x._origIdx:speeches.indexOf(x)))})`;
      return `
        <div class="${cardClass}" onclick="${cardClick}">
          <div class="speech-title" style="${editMode?'display:flex;align-items:center;gap:8px;':''}">${checkBox}${titleHl}</div>
          <div class="speech-meta">
            <span class="speech-date">${fmtDate(s.date)}</span>
            ${matchPill}
            ${speakerPill}
            ${provPill}
            ${locPill}
            ${paisPill}
            ${instPill}
            ${dupPill}
            ${sizePill}
          </div>
          <div class="speech-excerpt">${snippetHl}</div>
        </div>`;
    }).join('');
  }

  // Paginación
  const pagEl = document.getElementById('pagination');
  if (pages > 1) {
    pagEl.style.display = 'flex';
    let ph = `<button class="page-btn" onclick="gotoPage(${page-1})" ${page===0?'disabled':''}>‹ Anterior</button>`;
    const maxBtns = 7;
    let start = Math.max(0, page-3), end = Math.min(pages-1, start+maxBtns-1);
    if (end-start < maxBtns-1) start = Math.max(0, end-maxBtns+1);
    if (start>0) ph += `<button class="page-btn" onclick="gotoPage(0)">1</button><span class="page-info">…</span>`;
    for (let p2=start; p2<=end; p2++) {
      ph += `<button class="page-btn${p2===page?' active':''}" onclick="gotoPage(${p2})">${p2+1}</button>`;
    }
    if (end<pages-1) ph += `<span class="page-info">…</span><button class="page-btn" onclick="gotoPage(${pages-1})">${pages}</button>`;
    ph += `<button class="page-btn" onclick="gotoPage(${page+1})" ${page>=pages-1?'disabled':''}>Siguiente ›</button>`;
    ph += `<span class="page-info">Página ${page+1} de ${pages} · ${total.toLocaleString('es-AR')} discursos</span>`;
    pagEl.innerHTML = ph;
  } else {
    pagEl.style.display = 'none';
  }

  // Scroll al tope
  document.getElementById('speechList').scrollTop = 0;
}

// ─── READER ───────────────────────────────────────────────────────────────────

// Guardar índice del speech actual para el lector
let _readerSpeech = null;

function openReader(idx, idxMap) {
  const speechIdx = idxMap ? idxMap[idx] : idx;
  const s = speeches[speechIdx];
  if (!s) return;
  _readerSpeech = s;

  document.getElementById('browsePanel').style.display  = 'none';
  document.getElementById('readerPanel').style.display  = 'flex';

  // Breadcrumb del lector
  let bc;
  if (filter === 'all') {
    bc = 'Todos';
  } else {
    const slashIdx = filter.indexOf('/');
    if (slashIdx === -1) {
      bc = filter;
    } else {
      const sp   = filter.slice(0, slashIdx);
      const rest = filter.slice(slashIdx + 1);
      if (rest.includes('-')) {
        const [y, m] = rest.split('-');
        bc = `${sp} › ${y} › ${MONTHS_LONG[parseInt(m)-1]}`;
      } else {
        bc = `${sp} › ${rest}`;
      }
    }
  }
  if (searchQ) bc = `Buscar: "${searchQ}"`;
  document.getElementById('readerBreadcrumb').textContent = bc + ' › ' + (s.title||'').slice(0,60);

  // Texto con highlight
  const pqR = getParsedQuery();
  const terms = pqR.terms;
  const paragraphs = (s.text||'').split(/\n\n+/).filter(Boolean);
  const textHtml = paragraphs.map(p => `<p>${highlight(p, terms)}</p>`).join('');

  document.getElementById('readerBody').innerHTML = `
    <div class="reader-date">${fmtDate(s.date)}</div>
    <div class="reader-title">${escHtml(s.title||'')}</div>
    <div class="reader-meta-row">
      ${s.text ? `<span class="pill">${s.text.trim().split(/\s+/).filter(Boolean).length.toLocaleString('es-AR')} palabras</span>` : ''}
      ${s.url ? `<a class="reader-link" href="${escHtml(s.url)}" target="_blank" rel="noopener">Ver en cfkargentina.com ↗</a>` : ''}
    </div>
    <div class="reader-text">${textHtml}</div>`;

  // Match nav setup
  _readerMarks = [...document.querySelectorAll('#readerBody mark')];
  _readerMarkIdx = 0;
  updateMatchNav();

  if (_readerMarks.length) {
    setTimeout(() => {
      _readerMarks[0].classList.add('current');
      _readerMarks[0].scrollIntoView({behavior:'smooth', block:'center'});
    }, 80);
  } else {
    document.getElementById('readerBody').scrollTop = 0;
  }
}

function updateMatchNav() {
  const nav = document.getElementById('readerMatchNav');
  if (!_readerMarks.length) { nav.hidden = true; return; }
  nav.hidden = false;
  document.getElementById('matchCounter').textContent = `${_readerMarkIdx+1}/${_readerMarks.length}`;
}

function gotoMatch(idx) {
  if (!_readerMarks.length) return;
  const n = _readerMarks.length;
  _readerMarks[_readerMarkIdx]?.classList.remove('current');
  _readerMarkIdx = ((idx % n) + n) % n;
  const m = _readerMarks[_readerMarkIdx];
  m.classList.add('current');
  m.scrollIntoView({behavior:'smooth', block:'center'});
  updateMatchNav();
}
function prevMatch() { gotoMatch(_readerMarkIdx - 1); }
function nextMatch() { gotoMatch(_readerMarkIdx + 1); }

function closeReader() {
  document.getElementById('readerPanel').style.display  = 'none';
  document.getElementById('browsePanel').style.display  = 'flex';
  _readerMarks = [];
  document.getElementById('readerMatchNav').hidden = true;
}

function gotoPage(p) {
  page = p;
  renderList();
}

// ─── SIDEBAR REDIMENSIONABLE ──────────────────────────────────────────────────

(function() {
  const sidebar = document.getElementById('sidebar');
  const resizer = document.getElementById('sidebarResizer');
  const PREF    = 'cfk_sidebar_w';
  const saved   = localStorage.getItem(PREF);
  if (saved) sidebar.style.width = saved + 'px';

  let startX, startW;
  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX; startW = sidebar.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    const onMove = e => {
      const w = Math.min(400, Math.max(160, startW + e.clientX - startX));
      sidebar.style.width = w + 'px';
    };
    const onUp = () => {
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      localStorage.setItem(PREF, sidebar.offsetWidth);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
