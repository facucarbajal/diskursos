function median(arr) {
  if (!arr.length) return 0;
  const sorted = [...arr].sort((a,b)=>a-b);
  const mid = Math.floor(sorted.length/2);
  return sorted.length%2 ? sorted[mid] : Math.round((sorted[mid-1]+sorted[mid])/2);
}

function invalidateAnalysisCache() {
  _analysisCache = { stats:null, words:null, map:false, timeline:false };
}

function openAnalysis() {
  document.getElementById('analysisModal').hidden = false;
  setTab(_currentTab || 'stats');
}

function closeAnalysis() {
  document.getElementById('analysisModal').hidden = true;
}

function setTab(name) {
  _currentTab = name;
  for (const t of document.querySelectorAll('.modal-header .tab')) {
    t.classList.toggle('active', t.dataset.tab === name);
  }
  for (const p of document.querySelectorAll('.modal-body .tab-panel')) {
    p.hidden = p.dataset.tab !== name;
  }
  if (name === 'stats') renderStats();
  else if (name === 'words') renderTopWords();
  else if (name === 'map') renderMap();
  else if (name === 'timeline') renderTimeline();
}

function computeStats() {
  if (_analysisCache.stats) return _analysisCache.stats;
  const by = key => {
    const m = new Map();
    for (const s of speeches) {
      const v = key(s); if (!v) continue;
      m.set(v, (m.get(v)||0) + 1);
    }
    return [...m].sort((a,b) => b[1]-a[1]);
  };
  const wc = speeches.map(s => s.text ? s.text.trim().split(/\s+/).filter(Boolean).length : 0).filter(n => n > 0);
  const total = speeches.length;
  let minDate = '99999999', maxDate = '00000000';
  for (const s of speeches) {
    if (s.date && /^\d{8}$/.test(s.date)) {
      if (s.date < minDate) minDate = s.date;
      if (s.date > maxDate) maxDate = s.date;
    }
  }
  _analysisCache.stats = {
    total,
    bySpeaker: by(s => s.speaker),
    byYear:    by(s => s.date && s.date.slice(0,4)),
    byProv:    by(s => s.provincia),
    byInst:    by(s => s.institucion),
    avgWords:  wc.length ? Math.round(wc.reduce((a,b)=>a+b,0) / wc.length) : 0,
    medianWords: median(wc),
    totalWords: wc.reduce((a,b)=>a+b,0),
    minDate, maxDate,
  };
  return _analysisCache.stats;
}

function renderStats() {
  const st = computeStats();
  const panel = document.querySelector('.tab-panel[data-tab="stats"]');
  const fmtD = d => d && /^\d{8}$/.test(d) ? `${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)}` : '—';
  const speakerCounts = Object.fromEntries(st.bySpeaker);

  const tableHtml = (rows, max=10) => rows.slice(0, max).map(([k,v]) =>
    `<div class="stat-row"><span>${escHtml(k)}</span><b>${v.toLocaleString('es-AR')}</b></div>`
  ).join('') || '<div class="stat-row" style="color:var(--text-dim)">Sin datos</div>';

  panel.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total discursos</div><div class="value">${st.total.toLocaleString('es-AR')}</div></div>
      <div class="stat-card"><div class="label">Cristina</div><div class="value">${(speakerCounts['Cristina']||0).toLocaleString('es-AR')}</div></div>
      <div class="stat-card"><div class="label">Néstor</div><div class="value">${(speakerCounts['Néstor']||0).toLocaleString('es-AR')}</div></div>
      <div class="stat-card"><div class="label">Palabras totales</div><div class="value">${st.totalWords.toLocaleString('es-AR')}</div></div>
      <div class="stat-card"><div class="label">Promedio palabras</div><div class="value">${st.avgWords.toLocaleString('es-AR')}</div></div>
      <div class="stat-card"><div class="label">Mediana palabras</div><div class="value">${st.medianWords.toLocaleString('es-AR')}</div></div>
      <div class="stat-card"><div class="label">Fecha más antigua</div><div class="value" style="font-size:.95rem">${fmtD(st.minDate)}</div></div>
      <div class="stat-card"><div class="label">Fecha más reciente</div><div class="value" style="font-size:.95rem">${fmtD(st.maxDate)}</div></div>
    </div>
    <div class="stat-tables">
      <div><h3>Top años</h3>${tableHtml(st.byYear)}</div>
      <div><h3>Top provincias</h3>${tableHtml(st.byProv)}</div>
      <div><h3>Instituciones</h3>${tableHtml(st.byInst)}</div>
    </div>
  `;
}

function computeTopWords(limit=80) {
  if (_analysisCache.words) return _analysisCache.words;
  const freq = new Map();
  for (const s of speeches) {
    const txt = norm(s.text || '');
    const tokens = txt.split(/[^a-zñ0-9]+/);
    for (const t of tokens) {
      if (!t || t.length < 4) continue;
      if (STOPWORDS.has(t)) continue;
      if (/^\d+$/.test(t)) continue;
      freq.set(t, (freq.get(t)||0)+1);
    }
  }
  _analysisCache.words = [...freq].sort((a,b)=>b[1]-a[1]).slice(0, limit);
  return _analysisCache.words;
}

function renderTopWords() {
  const panel = document.querySelector('.tab-panel[data-tab="words"]');
  panel.innerHTML = '<div style="color:var(--text-dim)">Calculando…</div>';
  setTimeout(() => {
    const words = computeTopWords(80);
    if (!words.length) { panel.innerHTML = '<div>Sin datos</div>'; return; }
    const max = words[0][1];
    panel.innerHTML = `
      <div style="margin-bottom:10px; color:var(--text-dim); font-size:.8rem">
        Top ${words.length} palabras (4+ caracteres, sin stopwords). Click → buscar.
      </div>
      ${words.map(([w,c]) => `
        <div class="word-bar" onclick="searchFromWord('${escHtml(w)}')">
          <span class="word-label">${escHtml(w)}</span>
          <div class="word-bar-track"><div class="word-bar-fill" style="width:${(c/max*100).toFixed(1)}%"></div></div>
          <span class="word-count">${c.toLocaleString('es-AR')}</span>
        </div>
      `).join('')}
    `;
  }, 30);
}

function searchFromWord(w) {
  const input = document.getElementById('searchInput');
  input.value = w;
  closeAnalysis();
  searchQ = w;
  page = 0;
  refreshHeaderFilterAvailability();
  renderList();
}

function renderMap() {
  const panel = document.querySelector('.tab-panel[data-tab="map"]');
  const counts = new Map();
  let intCount = 0;
  for (const s of speeches) {
    if (!s.provincia) continue;
    if (s.provincia === 'Internacional') intCount++;
    else counts.set(s.provincia, (counts.get(s.provincia)||0)+1);
  }
  const max = Math.max(1, ...counts.values());
  const tiles = PROV_GRID.map(([col, row, prov, abbr]) => {
    const c = counts.get(prov) || 0;
    const intensity = c / max;
    const bg = c
      ? `hsl(140, 60%, ${12 + intensity*40}%)`
      : 'transparent';
    const borderC = c ? 'var(--accent2)' : 'var(--border)';
    const empty = c ? '' : ' empty';
    return `<div class="map-tile${empty}" style="grid-column:${col+1};grid-row:${row+1};background:${bg};border-color:${borderC}"
              data-prov="${escHtml(prov)}" data-count="${c}"
              onmouseenter="showMapTooltip(event,'${escHtml(prov)}: ${c} discurso${c!==1?'s':''}')"
              onmouseleave="hideMapTooltip()"
              onclick="${c?`filterByProvincia('${escHtml(prov)}')`:''}">${abbr}</div>`;
  }).join('');

  const allRows = [...counts].sort((a,b)=>b[1]-a[1]);
  if (intCount) allRows.push(['Internacional', intCount]);
  const listHtml = allRows.map(([p,c]) =>
    `<div class="stat-row" onclick="filterByProvincia('${escHtml(p)}')"><span>${escHtml(p)}</span><b>${c.toLocaleString('es-AR')}</b></div>`
  ).join('');

  panel.innerHTML = `
    <div class="map-wrap">
      <div class="map-grid" id="argMap">${tiles}</div>
      <div class="map-list">
        <h3 style="font-size:.78rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px">Provincias</h3>
        ${listHtml}
      </div>
    </div>
  `;
  _analysisCache.map = true;
}

function showMapTooltip(ev, text) {
  const tt = document.getElementById('mapTooltip');
  tt.textContent = text;
  tt.hidden = false;
  tt.style.left = (ev.clientX + 12) + 'px';
  tt.style.top  = (ev.clientY + 12) + 'px';
}
function hideMapTooltip() {
  document.getElementById('mapTooltip').hidden = true;
}

function filterByProvincia(prov) {
  hideMapTooltip();
  const sel = document.getElementById('hProvincia');
  // Asegurar que la opción exista (si recién se llena al cargar)
  if (![...sel.options].some(o => o.value === prov)) {
    const opt = document.createElement('option');
    opt.value = prov; opt.textContent = prov;
    sel.appendChild(opt);
  }
  sel.value = prov;
  closeAnalysis();
  onHeaderFilterChange();
}

function renderTimeline() {
  const panel = document.querySelector('.tab-panel[data-tab="timeline"]');
  const years = new Map();
  for (const s of speeches) {
    if (!s.date || s.date.length < 4) continue;
    const y = s.date.slice(0,4);
    if (!/^\d{4}$/.test(y)) continue;
    if (!years.has(y)) years.set(y, {Cristina:0, 'Néstor':0, other:0});
    const sp = s.speaker;
    if (sp === 'Cristina' || sp === 'Néstor') years.get(y)[sp]++;
    else years.get(y).other++;
  }
  const sorted = [...years].sort((a,b) => a[0].localeCompare(b[0]));
  if (!sorted.length) { panel.innerHTML = '<div>Sin datos</div>'; return; }

  const W = 1000, H = 320, padL = 40, padR = 20, padT = 20, padB = 40;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const max = Math.max(...sorted.map(([,v]) => v.Cristina + v['Néstor'] + v.other));
  const barW = innerW / sorted.length;
  const barInner = barW * 0.7;

  // Ticks y
  const ticks = 5;
  const tickStep = Math.ceil(max / ticks / 10) * 10;
  const yAxis = [];
  for (let v=0; v<=max+tickStep; v+=tickStep) {
    const y = padT + innerH - (v/max)*innerH;
    yAxis.push(`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#1e3f22" stroke-width="1"/>
                <text x="${padL-6}" y="${y+3}" fill="#7aA07f" font-size="10" text-anchor="end">${v}</text>`);
  }

  const bars = sorted.map(([year, v], i) => {
    const x = padL + i*barW + (barW-barInner)/2;
    const totC = v.Cristina, totN = v['Néstor'], totO = v.other;
    const tot = totC + totN + totO;
    const hC = (totC/max)*innerH;
    const hN = (totN/max)*innerH;
    const hO = (totO/max)*innerH;
    let yBase = padT + innerH;
    let html = '';
    if (totN) {
      yBase -= hN;
      html += `<rect class="timeline-bar" x="${x}" y="${yBase}" width="${barInner}" height="${hN}" fill="#e89441" onclick="filterByYear('${year}','Néstor')"><title>${year} · Néstor: ${totN}</title></rect>`;
    }
    if (totC) {
      yBase -= hC;
      html += `<rect class="timeline-bar" x="${x}" y="${yBase}" width="${barInner}" height="${hC}" fill="#4dbb6a" onclick="filterByYear('${year}','Cristina')"><title>${year} · Cristina: ${totC}</title></rect>`;
    }
    if (totO) {
      yBase -= hO;
      html += `<rect class="timeline-bar" x="${x}" y="${yBase}" width="${barInner}" height="${hO}" fill="#7aA07f" onclick="filterByYear('${year}','')"><title>${year} · otros: ${totO}</title></rect>`;
    }
    const labelX = x + barInner/2;
    html += `<text x="${labelX}" y="${H-padB+14}" fill="#7aA07f" font-size="10" text-anchor="middle">${year}</text>`;
    html += `<text x="${labelX}" y="${padT+innerH - (tot/max)*innerH - 4}" fill="#e4ede6" font-size="9" text-anchor="middle">${tot}</text>`;
    return html;
  }).join('');

  panel.innerHTML = `
    <div class="timeline-legend">
      <span><span class="sw" style="background:#4dbb6a"></span>Cristina</span>
      <span><span class="sw" style="background:#e89441"></span>Néstor</span>
      <span><span class="sw" style="background:#7aA07f"></span>Sin orador</span>
      <span style="color:var(--text-dim); margin-left:auto">Click en barra → filtra por año (y orador)</span>
    </div>
    <div class="timeline-wrap">
      <svg class="timeline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${yAxis.join('')}
        ${bars}
      </svg>
    </div>
  `;
  _analysisCache.timeline = true;
}

function filterByYear(year, speaker) {
  const ySel = document.getElementById('hYear');
  if (![...ySel.options].some(o => o.value === year)) {
    const opt = document.createElement('option');
    opt.value = year; opt.textContent = year;
    ySel.appendChild(opt);
  }
  ySel.value = year;
  if (speaker) {
    const sSel = document.getElementById('hSpeaker');
    sSel.value = speaker;
  }
  closeAnalysis();
  onHeaderFilterChange();
}

// Atajos de teclado
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const mod = document.getElementById('analysisModal');
    if (!mod.hidden) { closeAnalysis(); return; }
  }
  // Match nav solo si el reader está visible y no estamos escribiendo
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  const readerVisible = document.getElementById('readerPanel').style.display !== 'none';
  if (readerVisible && _readerMarks.length) {
    if (e.key === 'n') { e.preventDefault(); nextMatch(); }
    else if (e.key === 'N') { e.preventDefault(); prevMatch(); }
  }
});
